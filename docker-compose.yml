services:
  mysql:
    image: mysql:8.4
    container_name: word-dict-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: word_dict
      MYSQL_USER: worddict
      MYSQL_PASSWORD: worddict
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    image: node:20
    volumes:
      - ./data:/app/data
    working_dir: /app
    command: sleep infinity

volumes:
  mysql_data:
